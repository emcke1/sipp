<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serverless Image Processing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Serverless Image Processing</h1>
    <p class="subtitle">Upload an image — Azure Functions handles the rest.</p>
  </header>

  <main>
    <!-- Upload card -->
    <section class="card" id="upload-section">
      <h2>Upload Image</h2>

      <div class="drop-zone" id="drop-zone">
        <span class="drop-label">Drag &amp; drop an image here, or</span>
        <label class="btn" for="file-input">Choose file</label>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>

      <div class="options">
        <label class="checkbox-label">
          <input type="checkbox" id="opt-gray" />
          Grayscale conversion
        </label>
      </div>

      <button class="btn btn-primary" id="upload-btn" disabled>Process Image</button>

      <div id="status-bar" class="status hidden"></div>
    </section>

    <!-- Gallery card -->
    <section class="card" id="gallery-section">
      <h2>Processed Images</h2>
      <p class="empty-msg" id="empty-msg">No images processed yet.</p>
      <div class="gallery" id="gallery"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
